name: Auto Check In

on:
  schedule:
    - cron: "0 3 */6 * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Check In workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run clean-crawler.yml --repo ${{ github.repository }}
          echo "Auto Check In dispatched"
